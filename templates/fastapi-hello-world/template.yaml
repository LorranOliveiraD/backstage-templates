apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: fastapi-hello-world
  title: FastAPI Hello World
  description: "Cria um novo serviço FastAPI com endpoint GET / retornando Hello World e documentação automática em /docs"

spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Informações do Serviço
      required:
        - name
        - description
        - owner
        - repoUrl
      properties:
        name:
          title: Nome do Serviço
          type: string
          description: "Nome único do serviço (ex: meu-servico-api). Apenas letras minúsculas, números e hífens."
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Descrição
          type: string
          description: "Descrição do que o serviço faz"
          ui:options:
            rows: 3
        owner:
          title: Dono
          type: string
          description: "Time ou usuário responsável pelo serviço"
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        repoUrl:
          title: Repositório no GitHub
          type: string
          description: "Onde o repositório será criado"
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetchBase
      name: Criando estrutura
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Criar repositório no GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main

    - id: register
      name: Registrar no catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Abrir no catálogo
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
    text:
      - title: Serviço criado!
        content: |
          O serviço **${{ parameters.name }}** foi criado com sucesso!

          - **Repositório:** ${{ steps.publish.output.remoteUrl }}
          - **Documentação API:** Acesse `/docs` quando o serviço estiver rodando
